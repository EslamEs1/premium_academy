<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 440" width="540" height="440">
  <!-- Background shapes -->
  <circle cx="270" cy="220" r="190" fill="#EFF6FF" opacity="0.6"/>
  <!-- Laptop/Screen -->
  <rect x="120" y="130" width="300" height="190" rx="12" fill="#1E40AF"/>
  <rect x="130" y="140" width="280" height="170" rx="8" fill="#DBEAFE"/>
  <!-- Screen content lines -->
  <rect x="150" y="160" width="180" height="12" rx="4" fill="#93C5FD"/>
  <rect x="150" y="182" width="220" height="8" rx="4" fill="#BFDBFE"/>
  <rect x="150" y="200" width="200" height="8" rx="4" fill="#BFDBFE"/>
  <rect x="150" y="218" width="160" height="8" rx="4" fill="#BFDBFE"/>
  <!-- Chart on screen -->
  <rect x="310" y="165" width="80" height="110" rx="6" fill="white" opacity="0.3"/>
  <rect x="320" y="240" width="12" height="30" rx="2" fill="#2563EB"/>
  <rect x="338" y="225" width="12" height="45" rx="2" fill="#3B82F6"/>
  <rect x="356" y="210" width="12" height="60" rx="2" fill="#60A5FA"/>
  <rect x="374" y="195" width="12" height="75" rx="2" fill="#93C5FD"/>
  <!-- Laptop base -->
  <rect x="100" y="320" width="340" height="14" rx="7" fill="#1E40AF"/>
  <!-- Student figure -->
  <circle cx="420" cy="200" r="30" fill="#FDE68A"/>
  <rect x="395" y="230" width="50" height="70" rx="8" fill="#2563EB"/>
  <!-- Book -->
  <rect x="140" y="350" width="60" height="40" rx="4" fill="#FCA5A5"/>
  <line x1="170" y1="350" x2="170" y2="390" stroke="white" stroke-width="2"/>
  <!-- Graduation cap -->
  <polygon points="420,100 450,115 420,130 390,115" fill="#1E40AF"/>
  <rect x="418" y="128" width="4" height="20" fill="#1E40AF"/>
  <circle cx="420" cy="148" r="5" fill="#FACC15"/>
  <!-- Stars -->
  <text x="80" y="100" font-size="20" fill="#FACC15">★</text>
  <text x="440" y="350" font-size="16" fill="#FACC15">★</text>
  <text x="260" y="60" font-size="14" fill="#93C5FD">★</text>
</svg>
