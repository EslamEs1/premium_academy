upstream snaacademy {
    server unix:/run/gunicorn.sock;
}

server {
    listen 80;
    server_name snaacademy.com www.snaacademy.com;

    # Logging
    access_log /var/log/nginx/snaacademy_access.log;
    error_log  /var/log/nginx/snaacademy_error.log;

    # Favicon silence
    location = /favicon.ico { access_log off; log_not_found off; }

    # Static files — must match Django's STATIC_URL = '/static/'
    location /static/ {
        alias /var/www/premium_academy/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files — must match Django's MEDIA_URL = '/media/'
    location /media/ {
        alias /var/www/premium_academy/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Everything else → Gunicorn
    location / {
        include proxy_params;
        proxy_pass http://snaacademy;
    }
}
